<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erreur - Texte à trous</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #531f18, #1d241a);
      color: #f2e3c6;
      padding: 2rem;
      text-align: center;
    }

    .card {
      max-width: 600px;
      background: #fdf0dc;
      color: #3f2a1d;
      border: 5px solid #aa743a;
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 1.5rem 2rem rgba(0,0,0,.4);
    }

    h1 { margin-top: 0; }

    .btn {
      margin-top: 1.2rem;
      display: inline-block;
      text-decoration: none;
      color: #301b09;
      background: #f8c45d;
      padding: .75rem 1.25rem;
      border-radius: .5rem;
      font-weight: bold;
      border: 2px solid #92622e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Il y a des erreurs dans votre texte</h1>
    <p>Merci de vérifier vos réponses. Vous pouvez rester sur la page "texte à trous" pour corriger et retenter.</p>
    <a href="index.html" class="btn">Retour au texte à trous</a>
  </div>
</body>
</html>
